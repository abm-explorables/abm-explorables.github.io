<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>粘菌 — Physarum transport network</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Spectral:wght@300;400&display=swap" rel="stylesheet">
    <style>
        html,
        body {
            margin: 0;
            height: 100%;
            background: #0b0d12;
            overflow: hidden;
        }

        #stage {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            display: block;
            background: #0b0d12;
        }

        #cap {
            position: fixed;
            left: 22px;
            bottom: 18px;
            z-index: 2;
            font-family: "Spectral", Georgia, "Times New Roman", serif;
            font-weight: 300;
            font-size: 13px;
            line-height: 1.5;
            letter-spacing: .01em;
            color: #5b6276;
            pointer-events: none;
            text-shadow: 0 1px 14px #0b0d12, 0 0 2px #0b0d12;
            max-width: 80vw;
        }
    </style>
</head>

<body>
    <canvas id="stage"></canvas>
    <div id="cap">粘菌 — 単純な個体が、誰の設計図もなしに輸送網を組み上げる</div>

    <script>
        (function () {
            "use strict";

            var canvas = document.getElementById("stage");

            // ---- shared tuning constants -------------------------------------
            var TUNE = {
                SA_base: 0.40,     // sensor angle (rad) baseline
                SA_amp: 0.13,      // slow modulation amplitude
                SA_w: 0.061,       // angular speed of SA modulation
                SO_base: 9.0,      // sensor offset (texels) baseline
                SO_amp: 4.0,       // modulation amplitude
                SO_w: 0.043,       // angular speed of SO modulation
                SS: 1.0,           // step size (texels / frame)
                deposit: 1.0,      // pheromone dropped per agent per frame
                decay: 0.96,       // multiplicative decay of the trail field
                diffuse: 0.18,     // fraction of box-blur mixed in each frame
                gain: 0.18         // tonemap brightness gain
            };

            // ---- palette (mirrored in CPU path) ------------------------------
            // bg #0b0d12 -> #5b6276 -> #838aa0 -> #e8e9ee, whisper of #5a86d6
            // -------------------------------------------------------------------

            var DPR_CAP = 2.0;
            var SIM_CAP = 1500;     // longest sim-grid side (GPU)
            var AGENT_W = 1024;
            var AGENT_H = 512;      // 524288 agents
            var NUM_AGENTS = AGENT_W * AGENT_H;

            function simDims() {
                var dpr = Math.min(window.devicePixelRatio || 1, DPR_CAP);
                var w = Math.max(2, Math.floor(window.innerWidth * dpr));
                var h = Math.max(2, Math.floor(window.innerHeight * dpr));
                var s = Math.min(1, SIM_CAP / Math.max(w, h));
                return {
                    w: Math.max(2, Math.round(w * s)),
                    h: Math.max(2, Math.round(h * s))
                };
            }

            // ============================================================== //
            //                        GPU (WebGL2) PATH                       //
            // ============================================================== //
            function tryGPU() {
                var gl = canvas.getContext("webgl2", {
                    antialias: false,
                    depth: false,
                    stencil: false,
                    alpha: false,
                    preserveDrawingBuffer: false,
                    powerPreference: "high-performance"
                });
                if (!gl) throw new Error("webgl2 unavailable");
                if (!gl.getExtension("EXT_color_buffer_float")) {
                    throw new Error("EXT_color_buffer_float unavailable");
                }

                function makeShader(type, src) {
                    var sh = gl.createShader(type);
                    gl.shaderSource(sh, src);
                    gl.compileShader(sh);
                    if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) {
                        var info = gl.getShaderInfoLog(sh);
                        gl.deleteShader(sh);
                        throw new Error("shader compile failed: " + info);
                    }
                    return sh;
                }

                function makeProgram(vsSrc, fsSrc) {
                    var p = gl.createProgram();
                    gl.attachShader(p, makeShader(gl.VERTEX_SHADER, vsSrc));
                    gl.attachShader(p, makeShader(gl.FRAGMENT_SHADER, fsSrc));
                    gl.linkProgram(p);
                    if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
                        var info = gl.getProgramInfoLog(p);
                        gl.deleteProgram(p);
                        throw new Error("program link failed: " + info);
                    }
                    return p;
                }

                // ---- shader sources ----
                var QUAD_VS =
                    "#version 300 es\n" +
                    "layout(location = 0) in vec2 a_pos;\n" +
                    "out vec2 v_uv;\n" +
                    "void main(){ v_uv = a_pos*0.5+0.5; gl_Position = vec4(a_pos,0.0,1.0); }\n";

                var UPDATE_FS =
                    "#version 300 es\n" +
                    "precision highp float;\n" +
                    "uniform sampler2D u_agents;\n" +
                    "uniform sampler2D u_trail;\n" +
                    "uniform vec2 u_simRes;\n" +
                    "uniform float u_time;\n" +
                    "uniform float u_SA;\n" +   // sensor angle
                    "uniform float u_SO;\n" +   // sensor offset (texels)
                    "uniform float u_SS;\n" +   // step size (texels)
                    "uniform float u_RA;\n" +   // rotation angle
                    "in vec2 v_uv;\n" +
                    "out vec4 outColor;\n" +
                    "float hash(vec2 p){ p=fract(p*vec2(123.34,456.21)); p+=dot(p,p+45.32); return fract(p.x*p.y); }\n" +
                    "float senseAt(vec2 pos, float ang){\n" +
                    "  vec2 dir=vec2(cos(ang),sin(ang));\n" +
                    "  vec2 uv=(pos+dir*u_SO)/u_simRes;\n" +
                    "  return texture(u_trail, uv).r;\n" +
                    "}\n" +
                    "void main(){\n" +
                    "  vec4 a = texture(u_agents, v_uv);\n" +
                    "  vec2 pos = a.xy;\n" +
                    "  float ang = a.z;\n" +
                    "  float F  = senseAt(pos, ang);\n" +
                    "  float FL = senseAt(pos, ang + u_SA);\n" +
                    "  float FR = senseAt(pos, ang - u_SA);\n" +
                    "  float rnd = hash(v_uv + fract(u_time*0.37));\n" +
                    "  if (F > FL && F > FR) {\n" +
                    "    // continue straight\n" +
                    "  } else if (F < FL && F < FR) {\n" +
                    "    ang += (rnd < 0.5 ? -1.0 : 1.0) * u_RA;\n" +
                    "  } else if (FL < FR) {\n" +
                    "    ang -= u_RA;\n" +
                    "  } else if (FR < FL) {\n" +
                    "    ang += u_RA;\n" +
                    "  }\n" +
                    "  vec2 dir = vec2(cos(ang), sin(ang));\n" +
                    "  pos += dir * u_SS;\n" +
                    "  pos = mod(pos + u_simRes, u_simRes);\n" +
                    "  outColor = vec4(pos, ang, 1.0);\n" +
                    "}\n";

                var DEPOSIT_VS =
                    "#version 300 es\n" +
                    "precision highp float;\n" +
                    "uniform sampler2D u_agents;\n" +
                    "uniform int u_agentW;\n" +
                    "uniform vec2 u_simRes;\n" +
                    "void main(){\n" +
                    "  int id = gl_VertexID;\n" +
                    "  int x = id % u_agentW;\n" +
                    "  int y = id / u_agentW;\n" +
                    "  vec2 pos = texelFetch(u_agents, ivec2(x,y), 0).xy;\n" +
                    "  vec2 ndc = (pos / u_simRes) * 2.0 - 1.0;\n" +
                    "  gl_Position = vec4(ndc, 0.0, 1.0);\n" +
                    "  gl_PointSize = 1.0;\n" +
                    "}\n";

                var DEPOSIT_FS =
                    "#version 300 es\n" +
                    "precision highp float;\n" +
                    "uniform float u_deposit;\n" +
                    "out vec4 outColor;\n" +
                    "void main(){ outColor = vec4(u_deposit, 0.0, 0.0, 1.0); }\n";

                var DIFFUSE_FS =
                    "#version 300 es\n" +
                    "precision highp float;\n" +
                    "uniform sampler2D u_trail;\n" +
                    "uniform vec2 u_simRes;\n" +
                    "uniform float u_decay;\n" +
                    "uniform float u_diffuse;\n" +
                    "in vec2 v_uv;\n" +
                    "out vec4 outColor;\n" +
                    "void main(){\n" +
                    "  vec2 px = 1.0 / u_simRes;\n" +
                    "  float sum = 0.0;\n" +
                    "  sum += texture(u_trail, v_uv + px*vec2(-1.0,-1.0)).r;\n" +
                    "  sum += texture(u_trail, v_uv + px*vec2( 0.0,-1.0)).r;\n" +
                    "  sum += texture(u_trail, v_uv + px*vec2( 1.0,-1.0)).r;\n" +
                    "  sum += texture(u_trail, v_uv + px*vec2(-1.0, 0.0)).r;\n" +
                    "  float c = texture(u_trail, v_uv).r; sum += c;\n" +
                    "  sum += texture(u_trail, v_uv + px*vec2( 1.0, 0.0)).r;\n" +
                    "  sum += texture(u_trail, v_uv + px*vec2(-1.0, 1.0)).r;\n" +
                    "  sum += texture(u_trail, v_uv + px*vec2( 0.0, 1.0)).r;\n" +
                    "  sum += texture(u_trail, v_uv + px*vec2( 1.0, 1.0)).r;\n" +
                    "  float blur = sum / 9.0;\n" +
                    "  float v = mix(c, blur, u_diffuse) * u_decay;\n" +
                    "  outColor = vec4(v, 0.0, 0.0, 1.0);\n" +
                    "}\n";

                var RENDER_FS =
                    "#version 300 es\n" +
                    "precision highp float;\n" +
                    "uniform sampler2D u_trail;\n" +
                    "uniform float u_gain;\n" +
                    "in vec2 v_uv;\n" +
                    "out vec4 outColor;\n" +
                    "vec3 palette(float d){\n" +
                    "  vec3 bg = vec3(0.043,0.051,0.071);\n" +
                    "  vec3 c1 = vec3(0.357,0.384,0.463);\n" +  // 5b6276
                    "  vec3 c2 = vec3(0.514,0.541,0.627);\n" +  // 838aa0
                    "  vec3 c3 = vec3(0.910,0.914,0.933);\n" +  // e8e9ee
                    "  vec3 blue = vec3(0.353,0.525,0.839);\n" + // 5a86d6
                    "  vec3 col = mix(bg, c1, smoothstep(0.0,0.30,d));\n" +
                    "  col = mix(col, c2, smoothstep(0.24,0.58,d));\n" +
                    "  col = mix(col, c3, smoothstep(0.52,0.93,d));\n" +
                    "  col = mix(col, blue, smoothstep(0.93,1.0,d)*0.30);\n" +
                    "  return col;\n" +
                    "}\n" +
                    "void main(){\n" +
                    "  float v = texture(u_trail, v_uv).r;\n" +
                    "  float d = 1.0 - exp(-max(v,0.0) * u_gain);\n" +
                    "  outColor = vec4(palette(d), 1.0);\n" +
                    "}\n";

                var progUpdate = makeProgram(QUAD_VS, UPDATE_FS);
                var progDeposit = makeProgram(DEPOSIT_VS, DEPOSIT_FS);
                var progDiffuse = makeProgram(QUAD_VS, DIFFUSE_FS);
                var progRender = makeProgram(QUAD_VS, RENDER_FS);

                // ---- fullscreen quad ----
                var quadBuf = gl.createBuffer();
                gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
                gl.bufferData(gl.ARRAY_BUFFER,
                    new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);

                var quadVAO = gl.createVertexArray();
                gl.bindVertexArray(quadVAO);
                gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
                var locUpdatePos = gl.getAttribLocation(progUpdate, "a_pos");
                // a_pos lives at the same location across quad programs; enable per-VAO
                gl.enableVertexAttribArray(0);
                gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);
                gl.bindVertexArray(null);
                // Bind attrib location 0 explicitly for all quad programs
                // (handled by enabling location 0; attribute "a_pos" -> we must ensure loc 0)

                // empty VAO for the point/deposit pass
                var emptyVAO = gl.createVertexArray();

                var fbo = gl.createFramebuffer();

                function makeTrailTex(w, h) {
                    var t = gl.createTexture();
                    gl.bindTexture(gl.TEXTURE_2D, t);
                    gl.texImage2D(gl.TEXTURE_2D, 0, gl.R16F, w, h, 0, gl.RED, gl.HALF_FLOAT, null);
                    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
                    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
                    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.REPEAT);
                    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.REPEAT);
                    return t;
                }

                function makeAgentTex(data) {
                    var t = gl.createTexture();
                    gl.bindTexture(gl.TEXTURE_2D, t);
                    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA32F, AGENT_W, AGENT_H, 0,
                        gl.RGBA, gl.FLOAT, data);
                    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
                    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
                    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
                    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
                    return t;
                }

                var simW = 0, simH = 0;
                var trailA, trailB, agentA, agentB;

                function clearTex(tex, w, h) {
                    gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
                    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0,
                        gl.TEXTURE_2D, tex, 0);
                    gl.viewport(0, 0, w, h);
                    gl.clearColor(0, 0, 0, 0);
                    gl.clear(gl.COLOR_BUFFER_BIT);
                }

                function initAgentData(w, h) {
                    var data = new Float32Array(NUM_AGENTS * 4);
                    for (var i = 0; i < NUM_AGENTS; i++) {
                        var o = i * 4;
                        data[o] = Math.random() * w;
                        data[o + 1] = Math.random() * h;
                        data[o + 2] = Math.random() * Math.PI * 2.0;
                        data[o + 3] = 1.0;
                    }
                    return data;
                }

                function setup() {
                    var d = simDims();
                    simW = d.w; simH = d.h;
                    canvas.width = simW;
                    canvas.height = simH;

                    if (trailA) gl.deleteTexture(trailA);
                    if (trailB) gl.deleteTexture(trailB);
                    if (agentA) gl.deleteTexture(agentA);
                    if (agentB) gl.deleteTexture(agentB);

                    trailA = makeTrailTex(simW, simH);
                    trailB = makeTrailTex(simW, simH);
                    clearTex(trailA, simW, simH);
                    clearTex(trailB, simW, simH);

                    var adata = initAgentData(simW, simH);
                    agentA = makeAgentTex(adata);
                    agentB = makeAgentTex(null);
                }
                setup();

                // cache uniform locations
                var U = {
                    upd: {
                        agents: gl.getUniformLocation(progUpdate, "u_agents"),
                        trail: gl.getUniformLocation(progUpdate, "u_trail"),
                        simRes: gl.getUniformLocation(progUpdate, "u_simRes"),
                        time: gl.getUniformLocation(progUpdate, "u_time"),
                        SA: gl.getUniformLocation(progUpdate, "u_SA"),
                        SO: gl.getUniformLocation(progUpdate, "u_SO"),
                        SS: gl.getUniformLocation(progUpdate, "u_SS"),
                        RA: gl.getUniformLocation(progUpdate, "u_RA")
                    },
                    dep: {
                        agents: gl.getUniformLocation(progDeposit, "u_agents"),
                        agentW: gl.getUniformLocation(progDeposit, "u_agentW"),
                        simRes: gl.getUniformLocation(progDeposit, "u_simRes"),
                        deposit: gl.getUniformLocation(progDeposit, "u_deposit")
                    },
                    dif: {
                        trail: gl.getUniformLocation(progDiffuse, "u_trail"),
                        simRes: gl.getUniformLocation(progDiffuse, "u_simRes"),
                        decay: gl.getUniformLocation(progDiffuse, "u_decay"),
                        diffuse: gl.getUniformLocation(progDiffuse, "u_diffuse")
                    },
                    ren: {
                        trail: gl.getUniformLocation(progRender, "u_trail"),
                        gain: gl.getUniformLocation(progRender, "u_gain")
                    }
                };

                function bindTrailTarget(tex) {
                    gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
                    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0,
                        gl.TEXTURE_2D, tex, 0);
                    gl.viewport(0, 0, simW, simH);
                }

                var t0 = performance.now();

                function frame(now) {
                    var t = (now - t0) * 0.001;
                    var SA = TUNE.SA_base + TUNE.SA_amp * Math.sin(t * TUNE.SA_w);
                    var SO = TUNE.SO_base + TUNE.SO_amp * Math.sin(t * TUNE.SO_w + 1.7);

                    // -- 1. update agents: agentA + trailA -> agentB
                    gl.disable(gl.BLEND);
                    gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
                    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0,
                        gl.TEXTURE_2D, agentB, 0);
                    gl.viewport(0, 0, AGENT_W, AGENT_H);
                    gl.useProgram(progUpdate);
                    gl.bindVertexArray(quadVAO);
                    gl.activeTexture(gl.TEXTURE0);
                    gl.bindTexture(gl.TEXTURE_2D, agentA);
                    gl.uniform1i(U.upd.agents, 0);
                    gl.activeTexture(gl.TEXTURE1);
                    gl.bindTexture(gl.TEXTURE_2D, trailA);
                    gl.uniform1i(U.upd.trail, 1);
                    gl.uniform2f(U.upd.simRes, simW, simH);
                    gl.uniform1f(U.upd.time, t);
                    gl.uniform1f(U.upd.SA, SA);
                    gl.uniform1f(U.upd.SO, SO);
                    gl.uniform1f(U.upd.SS, TUNE.SS);
                    gl.uniform1f(U.upd.RA, SA);
                    gl.drawArrays(gl.TRIANGLES, 0, 3);

                    // -- 2. deposit: agentB -> trailA (additive)
                    bindTrailTarget(trailA);
                    gl.useProgram(progDeposit);
                    gl.bindVertexArray(emptyVAO);
                    gl.enable(gl.BLEND);
                    gl.blendFunc(gl.ONE, gl.ONE);
                    gl.activeTexture(gl.TEXTURE0);
                    gl.bindTexture(gl.TEXTURE_2D, agentB);
                    gl.uniform1i(U.dep.agents, 0);
                    gl.uniform1i(U.dep.agentW, AGENT_W);
                    gl.uniform2f(U.dep.simRes, simW, simH);
                    gl.uniform1f(U.dep.deposit, TUNE.deposit);
                    gl.drawArrays(gl.POINTS, 0, NUM_AGENTS);
                    gl.disable(gl.BLEND);

                    // -- 3. diffuse + decay: trailA -> trailB
                    bindTrailTarget(trailB);
                    gl.useProgram(progDiffuse);
                    gl.bindVertexArray(quadVAO);
                    gl.activeTexture(gl.TEXTURE0);
                    gl.bindTexture(gl.TEXTURE_2D, trailA);
                    gl.uniform1i(U.dif.trail, 0);
                    gl.uniform2f(U.dif.simRes, simW, simH);
                    gl.uniform1f(U.dif.decay, TUNE.decay);
                    gl.uniform1f(U.dif.diffuse, TUNE.diffuse);
                    gl.drawArrays(gl.TRIANGLES, 0, 3);

                    // -- 4. render trailB -> screen
                    gl.bindFramebuffer(gl.FRAMEBUFFER, null);
                    gl.viewport(0, 0, canvas.width, canvas.height);
                    gl.useProgram(progRender);
                    gl.bindVertexArray(quadVAO);
                    gl.activeTexture(gl.TEXTURE0);
                    gl.bindTexture(gl.TEXTURE_2D, trailB);
                    gl.uniform1i(U.ren.trail, 0);
                    gl.uniform1f(U.ren.gain, TUNE.gain);
                    gl.drawArrays(gl.TRIANGLES, 0, 3);

                    // -- swap
                    var ta = agentA; agentA = agentB; agentB = ta;
                    var tt = trailA; trailA = trailB; trailB = tt;

                    gl.bindVertexArray(null);
                    raf = requestAnimationFrame(frame);
                }

                var raf = requestAnimationFrame(frame);

                var resizeTimer = null;
                window.addEventListener("resize", function () {
                    if (resizeTimer) clearTimeout(resizeTimer);
                    resizeTimer = setTimeout(function () { setup(); }, 180);
                });

                // a tiny no-op read to surface deferred link/validation errors early
                void locUpdatePos;
                return true;
            }

            // ============================================================== //
            //                     CPU HYBRID FALLBACK                        //
            // ============================================================== //
            function startCPU() {
                var ctx = canvas.getContext("2d");
                var W = 0, H = 0;
                var trail = null, tmp = null;
                var img = null, buf = null;
                var N = 45000;
                var ax = null, ay = null, ah = null;

                // palette stops (linear rgb 0..255)
                var BG = [11, 13, 18];
                var C1 = [91, 98, 118];   // 5b6276
                var C2 = [131, 138, 160]; // 838aa0
                var C3 = [232, 233, 238]; // e8e9ee
                var BLUE = [90, 134, 214]; // 5a86d6

                function smoothstep(a, b, x) {
                    var t = Math.min(1, Math.max(0, (x - a) / (b - a)));
                    return t * t * (3 - 2 * t);
                }

                // precompute a 256-entry color LUT from density d
                var LUT = new Uint8Array(256 * 3);
                (function () {
                    for (var i = 0; i < 256; i++) {
                        var d = i / 255;
                        var m1 = smoothstep(0.0, 0.30, d);
                        var m2 = smoothstep(0.24, 0.58, d);
                        var m3 = smoothstep(0.52, 0.93, d);
                        var mb = smoothstep(0.93, 1.0, d) * 0.30;
                        for (var c = 0; c < 3; c++) {
                            var v = BG[c] + (C1[c] - BG[c]) * m1;
                            v = v + (C2[c] - v) * m2;
                            v = v + (C3[c] - v) * m3;
                            v = v + (BLUE[c] - v) * mb;
                            LUT[i * 3 + c] = Math.round(Math.min(255, Math.max(0, v)));
                        }
                    }
                })();

                function setup() {
                    var dpr = Math.min(window.devicePixelRatio || 1, 1.5);
                    var w = Math.floor(window.innerWidth * dpr);
                    var h = Math.floor(window.innerHeight * dpr);
                    var s = Math.min(1, 520 / Math.max(w, h));
                    W = Math.max(2, Math.round(w * s));
                    H = Math.max(2, Math.round(h * s));
                    canvas.width = W;
                    canvas.height = H;
                    trail = new Float32Array(W * H);
                    tmp = new Float32Array(W * H);
                    img = ctx.createImageData(W, H);
                    buf = img.data;
                    for (var p = 3; p < buf.length; p += 4) buf[p] = 255;
                    ax = new Float32Array(N);
                    ay = new Float32Array(N);
                    ah = new Float32Array(N);
                    for (var i = 0; i < N; i++) {
                        ax[i] = Math.random() * W;
                        ay[i] = Math.random() * H;
                        ah[i] = Math.random() * Math.PI * 2;
                    }
                }
                setup();

                function sample(x, y) {
                    var ix = ((x % W) + W) % W | 0;
                    var iy = ((y % H) + H) % H | 0;
                    return trail[iy * W + ix];
                }

                var t0 = performance.now();

                function step(now) {
                    var t = (now - t0) * 0.001;
                    var SA = TUNE.SA_base + TUNE.SA_amp * Math.sin(t * TUNE.SA_w);
                    var SO = TUNE.SO_base + TUNE.SO_amp * Math.sin(t * TUNE.SO_w + 1.7);
                    var SS = TUNE.SS;
                    var dep = TUNE.deposit * 4.0; // fewer agents -> heavier deposit

                    // agents: sense, turn, move, deposit
                    for (var i = 0; i < N; i++) {
                        var x = ax[i], y = ay[i], a = ah[i];
                        var cf = Math.cos(a), sf = Math.sin(a);
                        var F = sample(x + cf * SO, y + sf * SO);
                        var al = a + SA, ar = a - SA;
                        var FL = sample(x + Math.cos(al) * SO, y + Math.sin(al) * SO);
                        var FR = sample(x + Math.cos(ar) * SO, y + Math.sin(ar) * SO);
                        if (F > FL && F > FR) {
                            // straight
                        } else if (F < FL && F < FR) {
                            a += (Math.random() < 0.5 ? -1 : 1) * SA;
                        } else if (FL < FR) {
                            a -= SA;
                        } else if (FR < FL) {
                            a += SA;
                        }
                        x += Math.cos(a) * SS;
                        y += Math.sin(a) * SS;
                        x = ((x % W) + W) % W;
                        y = ((y % H) + H) % H;
                        ax[i] = x; ay[i] = y; ah[i] = a;
                        trail[(y | 0) * W + (x | 0)] += dep;
                    }

                    // separable box blur (radius 1) into tmp, then mix + decay
                    var diff = TUNE.diffuse, decay = TUNE.decay;
                    // horizontal
                    for (var yy = 0; yy < H; yy++) {
                        var row = yy * W;
                        for (var xx = 0; xx < W; xx++) {
                            var l = trail[row + (xx === 0 ? W - 1 : xx - 1)];
                            var c = trail[row + xx];
                            var r = trail[row + (xx === W - 1 ? 0 : xx + 1)];
                            tmp[row + xx] = (l + c + r) / 3;
                        }
                    }
                    // vertical + mix + decay
                    for (var xv = 0; xv < W; xv++) {
                        for (var yv = 0; yv < H; yv++) {
                            var up = tmp[(yv === 0 ? H - 1 : yv - 1) * W + xv];
                            var ce = tmp[yv * W + xv];
                            var dn = tmp[(yv === H - 1 ? 0 : yv + 1) * W + xv];
                            var blur = (up + ce + dn) / 3;
                            var idx = yv * W + xv;
                            trail[idx] = (trail[idx] + (blur - trail[idx]) * diff) * decay;
                        }
                    }

                    // render via LUT
                    var gain = TUNE.gain / 4.0; // matched to heavier deposit
                    for (var k = 0, p2 = 0; k < trail.length; k++, p2 += 4) {
                        var d = 1 - Math.exp(-trail[k] * gain);
                        var li = (d * 255) | 0;
                        if (li < 0) li = 0; else if (li > 255) li = 255;
                        var lo = li * 3;
                        buf[p2] = LUT[lo];
                        buf[p2 + 1] = LUT[lo + 1];
                        buf[p2 + 2] = LUT[lo + 2];
                    }
                    ctx.putImageData(img, 0, 0);

                    requestAnimationFrame(step);
                }
                requestAnimationFrame(step);

                var rt = null;
                window.addEventListener("resize", function () {
                    if (rt) clearTimeout(rt);
                    rt = setTimeout(setup, 200);
                });
            }

            // ---- boot: try GPU, fall back to CPU on any failure ----
            try {
                tryGPU();
            } catch (e) {
                console.error("[physarum] WebGL2 path failed, falling back to CPU hybrid:", e);
                try {
                    startCPU();
                } catch (e2) {
                    console.error("[physarum] CPU fallback also failed:", e2);
                }
            }
        })();
    </script>
</body>
