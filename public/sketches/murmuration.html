<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>群飛 — Murmuration / Vicsek</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Spectral:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box
        }

        html,
        body {
            margin: 0;
            height: 100%;
            overflow: hidden;
            background: #0b0d12;
            color: #e8e9ee;
        }

        #stage {
            position: fixed;
            inset: 0;
            display: block;
            width: 100vw;
            height: 100vh;
        }

        #caption {
            position: fixed;
            left: 26px;
            bottom: 22px;
            margin: 0;
            font-family: "Spectral", Georgia, "Times New Roman", serif;
            font-weight: 300;
            font-size: 13px;
            letter-spacing: .02em;
            line-height: 1.4;
            color: #5b6276;
            pointer-events: none;
            user-select: none;
            text-shadow: 0 1px 14px #0b0d12;
        }
    </style>
</head>

<body>
    <canvas id="stage"></canvas>
    <p id="caption">群飛 — リーダー不在の数千羽が、ひとつの流体になる</p>

    <script>
        (() => {
            "use strict";

            // ---------------------------------------------------------------
            //  Vicsek murmuration — order / disorder phase transition
            // ---------------------------------------------------------------
            const N = 6000;          // agents
            const R = 38;            // alignment / cohesion radius (px)
            const R2 = R * R;
            const RSEP = 13.0;       // separation radius
            const RSEP2 = RSEP * RSEP;
            const V0 = 1.7;          // base speed (px / frame @60fps)

            // hybrid weights — kept mild so the Vicsek transition still governs.
            // cohesion uses the *mean* neighbour offset (density-independent), so
            // flocks read as fluid sheets instead of collapsing into dense blobs.
            const W_COH = 0.30;      // cohesion (pull toward neighbour centroid)
            const W_SEP = 16.0;      // separation (push out of crowding)

            // noise oscillation: eta sweeps slowly through the critical value.
            // eta(t) = ETA_MID + ETA_AMP*sin(2π t / PERIOD)  →  range [0.70 , 5.70].
            // Verified headless: mean local coherence runs 0.98 (eta 0.7, blue flock)
            // → 0.22 (eta 5.7, grey gas); the down-crossing is the blue wash-in.
            const ETA_MID = 3.20;
            const ETA_AMP = 2.50;
            const PERIOD = 25.0;     // seconds for one full disorder→order→disorder cycle

            // ---- typed-array agent state -----------------------------------
            const x = new Float32Array(N);
            const y = new Float32Array(N);
            const th = new Float32Array(N);   // heading angle
            const nth = new Float32Array(N);  // next heading (synchronous update)
            const ct = new Float32Array(N);   // cos(heading) cache
            const st = new Float32Array(N);   // sin(heading) cache
            const coh = new Float32Array(N);  // local alignment coherence [0,1]
            const cnt = new Float32Array(N);  // local neighbour count

            // ---- spatial hash grid (counting sort, no O(n^2) fallback) -----
            let W = 0, H = 0;            // world dims (CSS px == canvas logical px)
            let cols = 0, rows = 0, nCell = 0;
            let csx = 0, csy = 0;        // cell size
            let cellOf = new Int32Array(N);
            let cellStart = new Int32Array(1);  // length nCell+1
            let cursor = new Int32Array(1);     // length nCell
            const order = new Int32Array(N);

            function buildGridDims() {
                // cells at least as wide as R so a 3x3 block covers the radius;
                // clamp to >=3 each axis so torus wrap never double-counts a cell.
                cols = Math.max(3, Math.floor(W / R));
                rows = Math.max(3, Math.floor(H / R));
                csx = W / cols;
                csy = H / rows;
                nCell = cols * rows;
                if (cellStart.length < nCell + 1) cellStart = new Int32Array(nCell + 1);
                if (cursor.length < nCell) cursor = new Int32Array(nCell);
            }

            // ---- canvas / DPR / resize -------------------------------------
            const cv = document.getElementById("stage");
            const g = cv.getContext("2d", { alpha: false });
            let dpr = 1;

            function resize() {
                dpr = Math.min(window.devicePixelRatio || 1, 2);
                const oldW = W, oldH = H;
                W = Math.max(2, window.innerWidth);
                H = Math.max(2, window.innerHeight);
                cv.width = Math.round(W * dpr);
                cv.height = Math.round(H * dpr);
                cv.style.width = W + "px";
                cv.style.height = H + "px";
                g.setTransform(dpr, 0, 0, dpr, 0, 0);
                // paint background so first faded frames have something to bleed into
                g.globalCompositeOperation = "source-over";
                g.fillStyle = "#0b0d12";
                g.fillRect(0, 0, W, H);
                buildGridDims();
                if (oldW === 0) seed();
                else rescatter(oldW, oldH); // keep agents inside the new torus
            }

            function seed() {
                for (let i = 0; i < N; i++) {
                    x[i] = Math.random() * W;
                    y[i] = Math.random() * H;
                    th[i] = Math.random() * Math.PI * 2;
                }
            }
            function rescatter(oldW, oldH) {
                for (let i = 0; i < N; i++) {
                    x[i] = (x[i] / oldW) * W;
                    y[i] = (y[i] / oldH) * H;
                }
            }

            // ---- colour palette --------------------------------------------
            // hue == data: coherence drives neutral→blue; density drives dim→bright.
            // No other hue exists in the system.
            const C_DIM = [0x83, 0x8a, 0xa0];   // #838aa0  sparse / disordered grey
            const C_BRIGHT = [0xe8, 0xe9, 0xee]; // #e8e9ee  dense off-white
            const C_BLUE = [0x5a, 0x86, 0xd6];   // #5a86d6  order / stability blue
            const COH_BINS = 14, BRI_BINS = 5;
            const palette = new Array(COH_BINS * BRI_BINS);
            (function buildPalette() {
                const lerp = (a, b, t) => a + (b - a) * t;
                for (let cb = 0; cb < COH_BINS; cb++) {
                    let cBlend = cb / (COH_BINS - 1);
                    cBlend = cBlend * cBlend * (3 - 2 * cBlend); // smoothstep — blue snaps in
                    for (let bb = 0; bb < BRI_BINS; bb++) {
                        const bt = bb / (BRI_BINS - 1);
                        const nr = lerp(C_DIM[0], C_BRIGHT[0], bt);
                        const ng = lerp(C_DIM[1], C_BRIGHT[1], bt);
                        const nb = lerp(C_DIM[2], C_BRIGHT[2], bt);
                        const r = Math.round(lerp(nr, C_BLUE[0], cBlend));
                        const gg = Math.round(lerp(ng, C_BLUE[1], cBlend));
                        const b = Math.round(lerp(nb, C_BLUE[2], cBlend));
                        palette[cb * BRI_BINS + bb] = "rgb(" + r + "," + gg + "," + b + ")";
                    }
                }
            })();

            // ---- simulation step -------------------------------------------
            let etaNow = ETA_MID;

            function step(tSec) {
                etaNow = ETA_MID + ETA_AMP * Math.sin((2 * Math.PI * tSec) / PERIOD);

                // cache heading vectors
                for (let i = 0; i < N; i++) {
                    ct[i] = Math.cos(th[i]);
                    st[i] = Math.sin(th[i]);
                }

                // ---- build grid (counting sort) ----
                cellStart.fill(0, 0, nCell + 1);
                for (let i = 0; i < N; i++) {
                    let cx = (x[i] / csx) | 0; if (cx >= cols) cx = cols - 1; else if (cx < 0) cx = 0;
                    let cy = (y[i] / csy) | 0; if (cy >= rows) cy = rows - 1; else if (cy < 0) cy = 0;
                    const c = cy * cols + cx;
                    cellOf[i] = c;
                    cellStart[c + 1]++;
                }
                for (let c = 0; c < nCell; c++) cellStart[c + 1] += cellStart[c];
                cursor.set(cellStart.subarray(0, nCell));
                for (let i = 0; i < N; i++) {
                    const c = cellOf[i];
                    order[cursor[c]++] = i;
                }

                const halfW = W * 0.5, halfH = H * 0.5;

                // ---- neighbour pass: compute next heading + coherence ----
                for (let i = 0; i < N; i++) {
                    const xi = x[i], yi = y[i];
                    const ci = cellOf[i];
                    const cx = ci % cols, cy = (ci / cols) | 0;

                    let sCos = 0, sSin = 0, sumDX = 0, sumDY = 0, sepX = 0, sepY = 0, n = 0;

                    for (let gy = -1; gy <= 1; gy++) {
                        let ny = cy + gy; if (ny < 0) ny += rows; else if (ny >= rows) ny -= rows;
                        const rowBase = ny * cols;
                        for (let gx = -1; gx <= 1; gx++) {
                            let nx = cx + gx; if (nx < 0) nx += cols; else if (nx >= cols) nx -= cols;
                            const cell = rowBase + nx;
                            const s = cellStart[cell], e = cellStart[cell + 1];
                            for (let p = s; p < e; p++) {
                                const j = order[p];
                                let dx = x[j] - xi, dy = y[j] - yi;
                                // minimal-image (torus) deltas
                                if (dx > halfW) dx -= W; else if (dx < -halfW) dx += W;
                                if (dy > halfH) dy -= H; else if (dy < -halfH) dy += H;
                                const d2 = dx * dx + dy * dy;
                                if (d2 > R2) continue;
                                sCos += ct[j]; sSin += st[j];
                                sumDX += dx; sumDY += dy;
                                n++;
                                if (d2 < RSEP2 && d2 > 1e-4) {
                                    const inv = 1 / d2;     // push away, stronger when closer
                                    sepX -= dx * inv;
                                    sepY -= dy * inv;
                                }
                            }
                        }
                    }

                    // local alignment coherence = |mean unit velocity| of neighbours
                    const mag = Math.sqrt(sCos * sCos + sSin * sSin);
                    const cc = n > 0 ? mag / n : 0;
                    coh[i] = cc;
                    cnt[i] = n;

                    // desired direction: Vicsek alignment + mild cohesion + separation.
                    // cohesion is mean-normalised (invn) so it cannot scale with
                    // density and runaway-collapse the flock into a point.
                    const invn = n > 0 ? 1 / n : 0;
                    const dirX = sCos + W_COH * sumDX * invn + W_SEP * sepX;
                    const dirY = sSin + W_COH * sumDY * invn + W_SEP * sepY;
                    let ang = (dirX === 0 && dirY === 0) ? th[i] : Math.atan2(dirY, dirX);
                    ang += etaNow * (Math.random() - 0.5);   // angular noise (the control knob)
                    nth[i] = ang;
                }

                // ---- integrate (synchronous: positions move on new heading) ----
                for (let i = 0; i < N; i++) {
                    const a = nth[i];
                    th[i] = a;
                    const spd = V0 * (0.78 + 0.55 * coh[i]); // coherent rivers flow faster
                    let xx = x[i] + Math.cos(a) * spd;
                    let yy = y[i] + Math.sin(a) * spd;
                    if (xx < 0) xx += W; else if (xx >= W) xx -= W;
                    if (yy < 0) yy += H; else if (yy >= H) yy -= H;
                    x[i] = xx; y[i] = yy;
                }
            }

            // ---- render -----------------------------------------------------
            function draw() {
                // motion-blur: fade prior frame instead of clearing
                g.globalCompositeOperation = "source-over";
                g.fillStyle = "rgba(11,13,18,0.16)";
                g.fillRect(0, 0, W, H);

                // additive points — density becomes luminosity
                g.globalCompositeOperation = "lighter";
                let lastIdx = -1;
                for (let i = 0; i < N; i++) {
                    const cc = coh[i];
                    let cb = (cc * (COH_BINS - 1) + 0.5) | 0;
                    if (cb >= COH_BINS) cb = COH_BINS - 1;
                    let bri = (cnt[i] - 3) / 55;            // density → brightness (sparse=dim grey, dense core=bright)
                    if (bri < 0) bri = 0; else if (bri > 1) bri = 1;
                    let bb = (bri * (BRI_BINS - 1) + 0.5) | 0;
                    if (bb >= BRI_BINS) bb = BRI_BINS - 1;
                    const idx = cb * BRI_BINS + bb;
                    if (idx !== lastIdx) {
                        g.globalAlpha = 0.42 + 0.18 * cc;   // coherent points read a touch stronger
                        g.fillStyle = palette[idx];
                        lastIdx = idx;
                    }
                    const sz = 1.0 + 1.55 * cc;             // size varies with coherence/speed
                    const h = sz * 0.5;
                    g.fillRect(x[i] - h, y[i] - h, sz, sz);
                }
                g.globalAlpha = 1;
                g.globalCompositeOperation = "source-over";
            }

            // ---- main loop --------------------------------------------------
            let t0 = 0;
            function frame(now) {
                if (!t0) t0 = now;
                const tSec = (now - t0) / 1000;
                step(tSec);
                draw();
                requestAnimationFrame(frame);
            }

            window.addEventListener("resize", resize, { passive: true });
            resize();
            // warm up so the opening frame is already a living flock
            for (let k = 0; k < 60; k++) step(k * (1 / 60));
            requestAnimationFrame(frame);
        })();
    </script>
</body>

</html>
