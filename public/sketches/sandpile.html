<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>砂山 — self-organized criticality</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital@0;1&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: #0b0d12;
  }
  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }
  #caption {
    position: fixed;
    left: 20px;
    bottom: 16px;
    font-family: 'Spectral', serif;
    font-size: 13px;
    color: #5b6276;
    letter-spacing: 0.02em;
    user-select: none;
    pointer-events: none;
  }
</style>
</head>
<body>
<canvas id="field"></canvas>
<div id="caption">砂山 — 一粒ずつ積むだけで、雪崩の規模はべき乗則に従う</div>
<script>
(function () {
  'use strict';

  /* ------------------------------------------------------------------
     Tuning knobs
     ------------------------------------------------------------------ */
  var CELL_PX                 = 3;        // CSS pixels per lattice cell
  var GRAINS_PER_FRAME        = 2;        // grains dropped each animation frame
  var TOPPLE_SWEEPS_PER_FRAME = 3;        // wavefront speed: lattice steps an avalanche advances per frame
  var FIXED_DROP_POINTS       = 4;        // number of persistent drop sites
  var RANDOM_DROP_CHANCE      = 0.18;     // probability a grain falls at a random cell instead
  var DROP_JITTER             = 2;        // jitter radius (cells) around each fixed site
  var GLOW_FADE_S             = 0.42;     // e-folding time of the red afterglow (visually ~1.5 s to quiet)
  var PREFILL_MEAN_WEIGHTS    = [0.07, 0.18, 0.35, 0.40]; // P(h=0..3) at init -> mean ~2.08, just under critical
  var WARMUP_TOPPLE_BUDGET    = 2500000;  // instant (silent) relaxation work allowed at startup
  var WARMUP_GRAIN_FRACTION   = 0.12;     // silent warm-up grains as a fraction of cell count

  /* Locked palette — quiet navy steps for h = 0..3, hue reserved for toppling */
  var QUIET = [
    [11, 13, 18],   // #0b0d12
    [15, 18, 25],
    [20, 24, 34],
    [26, 31, 44]    // #1a1f2c
  ];
  var HOT   = [255, 94, 87];   // #ff5e57 — cell toppling right now
  var EMBER = [128, 52, 38];   // warmer ember the glow decays through

  /* ------------------------------------------------------------------
     State
     ------------------------------------------------------------------ */
  var canvas = document.getElementById('field');
  var ctx = canvas.getContext('2d');
  var off = document.createElement('canvas');
  var offCtx = off.getContext('2d');

  var W = 0, H = 0, N = 0;
  var height32;            // Uint8Array  — sand height per cell
  var glow;                // Float32Array — afterglow intensity 0..1
  var inQ;                 // Uint8Array  — dedupe flag for the topple queue
  var qCur, qNext;         // Int32Array  — active toppling fronts
  var cntCur = 0, cntNext = 0;
  var img, px32;           // ImageData and a Uint32 view of it
  var quiet32 = new Uint32Array(4);
  var dropSites = [];
  var lastT = 0;

  function packABGR(rgb) {
    return (255 << 24) | (rgb[2] << 16) | (rgb[1] << 8) | rgb[0];
  }

  function init() {
    var dpr = Math.min(window.devicePixelRatio || 1, 2);
    var cssW = window.innerWidth;
    var cssH = window.innerHeight;

    canvas.width = Math.max(1, Math.round(cssW * dpr));
    canvas.height = Math.max(1, Math.round(cssH * dpr));

    W = Math.max(8, Math.ceil(cssW / CELL_PX));
    H = Math.max(8, Math.ceil(cssH / CELL_PX));
    N = W * H;

    height32 = new Uint8Array(N);
    glow = new Float32Array(N);
    inQ = new Uint8Array(N);
    qCur = new Int32Array(N);
    qNext = new Int32Array(N);
    cntCur = 0;
    cntNext = 0;

    off.width = W;
    off.height = H;
    img = offCtx.createImageData(W, H);
    px32 = new Uint32Array(img.data.buffer);

    for (var k = 0; k < 4; k++) quiet32[k] = packABGR(QUIET[k]);

    /* Prefill just below critical density so power-law behaviour emerges fast */
    var c0 = PREFILL_MEAN_WEIGHTS[0];
    var c1 = c0 + PREFILL_MEAN_WEIGHTS[1];
    var c2 = c1 + PREFILL_MEAN_WEIGHTS[2];
    for (var i = 0; i < N; i++) {
      var r = Math.random();
      height32[i] = r < c0 ? 0 : r < c1 ? 1 : r < c2 ? 2 : 3;
    }

    /* Fixed drop sites at quasi-random (golden-ratio) positions, away from edges */
    dropSites.length = 0;
    var gx = 0.382, gy = 0.591;
    for (var s = 0; s < FIXED_DROP_POINTS; s++) {
      gx = (gx + 0.6180339887) % 1;
      gy = (gy + 0.7548776662) % 1;
      dropSites.push([
        Math.floor((0.15 + 0.7 * gx) * W),
        Math.floor((0.15 + 0.7 * gy) * H)
      ]);
    }

    warmUp();
  }

  /* Silent warm-up: drop grains and relax them instantly (no animation, no glow)
     so the lattice carries critical-state correlations from the first frame. */
  function warmUp() {
    var budget = WARMUP_TOPPLE_BUDGET;
    var grains = Math.floor(N * WARMUP_GRAIN_FRACTION);
    var stack = new Int32Array(N);
    for (var g = 0; g < grains && budget > 0; g++) {
      var idx = (Math.random() * N) | 0;
      height32[idx]++;
      if (height32[idx] < 4) continue;
      var top = 0;
      stack[top++] = idx;
      while (top > 0 && budget > 0) {
        var c = stack[--top];
        if (height32[c] < 4) continue;
        height32[c] -= 4;
        budget--;
        var x = c % W;
        if (x > 0     && ++height32[c - 1] >= 4 && top < N) stack[top++] = c - 1;
        if (x < W - 1 && ++height32[c + 1] >= 4 && top < N) stack[top++] = c + 1;
        if (c >= W    && ++height32[c - W] >= 4 && top < N) stack[top++] = c - W;
        if (c < N - W && ++height32[c + W] >= 4 && top < N) stack[top++] = c + W;
        if (height32[c] >= 4 && top < N) stack[top++] = c;
      }
    }
  }

  /* ------------------------------------------------------------------
     Live simulation — avalanches propagate one lattice step per sweep
     ------------------------------------------------------------------ */
  function pushCur(idx) {
    if (!inQ[idx]) { inQ[idx] = 1; qCur[cntCur++] = idx; }
  }

  function dropGrain() {
    var x, y;
    if (Math.random() < RANDOM_DROP_CHANCE) {
      x = (Math.random() * W) | 0;
      y = (Math.random() * H) | 0;
    } else {
      var site = dropSites[(Math.random() * dropSites.length) | 0];
      x = site[0] + ((Math.random() * (2 * DROP_JITTER + 1)) | 0) - DROP_JITTER;
      y = site[1] + ((Math.random() * (2 * DROP_JITTER + 1)) | 0) - DROP_JITTER;
      if (x < 0) x = 0; else if (x >= W) x = W - 1;
      if (y < 0) y = 0; else if (y >= H) y = H - 1;
    }
    var idx = y * W + x;
    height32[idx]++;
    if (height32[idx] >= 4) pushCur(idx);
  }

  function sweep() {
    var n = cntCur;
    cntNext = 0;
    for (var i = 0; i < n; i++) {
      var idx = qCur[i];
      inQ[idx] = 0;
      if (height32[idx] < 4) continue;
      height32[idx] -= 4;
      glow[idx] = 1;
      var x = idx % W;
      var nb;
      if (x > 0) {
        nb = idx - 1;
        if (++height32[nb] >= 4 && !inQ[nb]) { inQ[nb] = 1; qNext[cntNext++] = nb; }
      }
      if (x < W - 1) {
        nb = idx + 1;
        if (++height32[nb] >= 4 && !inQ[nb]) { inQ[nb] = 1; qNext[cntNext++] = nb; }
      }
      if (idx >= W) {
        nb = idx - W;
        if (++height32[nb] >= 4 && !inQ[nb]) { inQ[nb] = 1; qNext[cntNext++] = nb; }
      }
      if (idx < N - W) {
        nb = idx + W;
        if (++height32[nb] >= 4 && !inQ[nb]) { inQ[nb] = 1; qNext[cntNext++] = nb; }
      }
      if (height32[idx] >= 4 && !inQ[idx]) { inQ[idx] = 1; qNext[cntNext++] = idx; }
    }
    var tmp = qCur; qCur = qNext; qNext = tmp;
    cntCur = cntNext;
  }

  /* ------------------------------------------------------------------
     Rendering
     ------------------------------------------------------------------ */
  function render(decayMul) {
    var n = N;
    var hr = HOT[0], hg = HOT[1], hb = HOT[2];
    var er = EMBER[0], eg = EMBER[1], eb = EMBER[2];
    for (var i = 0; i < n; i++) {
      var g = glow[i];
      if (g > 0.004) {
        g *= decayMul;
        glow[i] = g;
        var h = height32[i];
        var base = QUIET[h < 3 ? h : 3];
        var r, gg, b;
        if (g > 0.45) {
          /* fresh topple: ember -> hot */
          var t = (g - 0.45) / 0.55;
          r = er + (hr - er) * t;
          gg = eg + (hg - eg) * t;
          b = eb + (hb - eb) * t;
        } else {
          /* decay: quiet -> ember */
          var u = g / 0.45;
          r = base[0] + (er - base[0]) * u;
          gg = base[1] + (eg - base[1]) * u;
          b = base[2] + (eb - base[2]) * u;
        }
        px32[i] = (255 << 24) | ((b | 0) << 16) | ((gg | 0) << 8) | (r | 0);
      } else {
        if (g !== 0) glow[i] = 0;
        var hh = height32[i];
        px32[i] = quiet32[hh < 3 ? hh : 3];
      }
    }
    offCtx.putImageData(img, 0, 0);
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(off, 0, 0, canvas.width, canvas.height);
  }

  /* ------------------------------------------------------------------
     Main loop
     ------------------------------------------------------------------ */
  function frame(t) {
    var dt = lastT ? (t - lastT) / 1000 : 1 / 60;
    lastT = t;
    if (dt > 0.25) dt = 0.25;        // tab was hidden; don't dump decay

    for (var d = 0; d < GRAINS_PER_FRAME; d++) dropGrain();
    for (var s = 0; s < TOPPLE_SWEEPS_PER_FRAME; s++) {
      if (cntCur === 0) break;
      sweep();
    }

    render(Math.exp(-dt / GLOW_FADE_S));
    requestAnimationFrame(frame);
  }

  var resizeTimer = 0;
  window.addEventListener('resize', function () {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(init, 160);
  });

  init();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
